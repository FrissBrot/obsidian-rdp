services:
  obsidian-workspace:
    container_name: obsidian-workspace
    hostname: obsidian-workspace
    build:
      context: .
      dockerfile: Dockerfile
      args:
        OBSIDIAN_VERSION: "${OBSIDIAN_VERSION}"
    image: obsidian-workspace:${OBSIDIAN_VERSION}
    networks:
      - guacamole_guac_remote
    environment:
      APP_MODE: "${APP_MODE:-restart}"
      USER_NAME: "user"
      USER_PASSWORD: "${USER_PASSWORD:?set USER_PASSWORD in .env}"
    volumes:
      - "./data/Obsidian Vault:/home/user/Obsidian Vault"
      - "./data/config:/home/user/.config/obsidian"
      - "./data/local-share:/home/user/.local/share/obsidian"
      - "./data/cache:/home/user/.cache"
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    shm_size: "1gb"
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

    # Nur freigeben, wenn du direkt per RDP drauf willst
    # ports:
    #   - "3389:3389"

networks:
  guacamole_guac_remote:
    external: true
